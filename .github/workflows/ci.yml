name: Session Memory Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Syntax check all Python files
      run: |
        python -m py_compile install.sh || true
        python -m py_compile session_memory_client.py
        python -m py_compile memory_hook.py
        python -m py_compile kg_sync.py
        python -m py_compile shell_history_sync.py
        echo "Python syntax OK"
    
    - name: Run unit tests
      run: |
        python -c "
import sys
sys.path.insert(0, '.')
from session_memory_client import SessionMemoryClient
print('SessionMemoryClient load OK')
"
    
    - name: Test install script (dry run)
      run: |
        bash -n install.sh
        echo "install.sh syntax OK"
    
    - name: Test bash hook
      run: |
        bash -n bash_memory_hook.sh
        echo "bash_memory_hook.sh syntax OK"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to remote server
      run: |
        echo "Deploy would happen here via SSH"
        echo "scp index.html jimwong@10.100.1.13:/home/jimwong/session-memory/src/static/"
